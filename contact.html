<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background-color:#f4f4f4;
            color:#333;
            padding:30px;
        }

        .navbar{
            background-color:#333;
            padding:15px 30px;
            border-radius:8px;
            margin-bottom:30px;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            justify-content:center;
            gap:25px;
        }

        .navbar a{
            text-decoration:none;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .navbar a:hover{
            color:#ff6347;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        form{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        textarea{
            resize:none;
        }

        .phone-box{
            display:flex;
            gap:15px;
        }

        .phone-box select{
            width:30%;
        }

        .phone-box input{
            width:70%;
        }

        button{
            width:100%;
            padding:14px;
            background-color:#333;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background-color:#ff6347;
        }

        #successMessage{
            display:none;
            margin-top:20px;
            text-align:center;
            color:green;
            font-size:18px;
            font-weight:bold;
        }

        .map-container{
            max-width:800px;
            margin:30px auto;
        }

        .map-container iframe{
            width:100%;
            height:300px;
            border:0;
            border-radius:10px;
        }

        @media(max-width:768px){

            .phone-box{
                flex-direction:column;
            }

            .phone-box select,
            .phone-box input{
                width:100%;
            }

            .navbar ul{
                flex-direction:column;
                text-align:center;
            }

        }

    </style>

</head>

<body>

    <header>

        <nav class="navbar">

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="convertor.html">Convertor</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>

        </nav>

    </header>

    <h1>Contact Us</h1>

    <form id="contactForm">

        <div class="form-group">

            <label>First Name</label>

            <input
                type="text"
                id="FirstName"
                placeholder="Enter First Name"
                required
            >

        </div>

        <div class="form-group">

            <label>Last Name</label>

            <input
                type="text"
                id="LastName"
                placeholder="Enter Last Name"
                required
            >

        </div>

        <div class="form-group">

            <label>Email</label>

            <input
                type="email"
                id="Email"
                placeholder="Enter Email"
                required
            >

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <div class="phone-box">

                <select id="countryCode" required>

                    <option value="+91">+91 (India)</option>
                    <option value="+1">+1 (USA)</option>
                    <option value="+44">+44 (UK)</option>
                    <option value="+61">+61 (Australia)</option>
                    <option value="+81">+81 (Japan)</option>

                </select>

                <input
                    type="tel"
                    id="MobileNumber"
                    placeholder="Enter Mobile Number"
                    required
                >

            </div>

        </div>

        <div class="form-group">

            <label>Message</label>

            <textarea
                id="Message"
                rows="6"
                placeholder="Enter Your Message"
                required
            ></textarea>

        </div>

        <button type="submit">
            Submit
        </button>

    </form>

    <div id="successMessage">
        Thank you for contacting us!
    </div>

    <div class="map-container">

        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3916.227084242119!2d76.95583237480661!3d11.017215489146195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba859b8f8f7f8b5%3A0x7b3bff1d2a2f5f0f!2sCoimbatore!5e0!3m2!1sen!2sin!4v1710000000000!5m2!1sen!2sin"
            allowfullscreen=""
            loading="lazy">
        </iframe>

    </div>

    <script>

        const form = document.getElementById("contactForm");

        const successMessage = document.getElementById("successMessage");

        form.addEventListener("submit", function(event){

            event.preventDefault();

            const email = document.getElementById("Email").value;

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(!emailPattern.test(email)){

                alert("Please enter a valid email address");

                return;

            }

            successMessage.style.display = "block";

            form.reset();

        });

    </script>

</body>
</html>
