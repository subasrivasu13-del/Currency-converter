<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contact Us</title>

    <!-- EmailJS CDN -->

    <script
        type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background-color:#f4f4f4;
            color:#333;
            padding:30px;
        }

        .navbar{
            background-color:#333;
            padding:15px 30px;
            border-radius:8px;
            margin-bottom:30px;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            justify-content:center;
            gap:25px;
        }

        .navbar a{
            text-decoration:none;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .navbar a:hover{
            color:#ff6347;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        form{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        textarea{
            resize:none;
        }

        .phone-box{
            display:flex;
            gap:15px;
        }

        .phone-box select{
            width:30%;
        }

        .phone-box input{
            width:70%;
        }

        button{
            width:100%;
            padding:14px;
            background-color:#333;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background-color:#ff6347;
        }

        #successMessage{
            display:none;
            margin-top:20px;
            text-align:center;
            color:green;
            font-size:18px;
            font-weight:bold;
        }

        .map-container{
            max-width:800px;
            margin:30px auto;
        }

        .map-container iframe{
            width:100%;
            height:350px;
            border:0;
            border-radius:10px;
        }

        @media(max-width:768px){

            .phone-box{
                flex-direction:column;
            }

            .phone-box select,
            .phone-box input{
                width:100%;
            }

            .navbar ul{
                flex-direction:column;
                text-align:center;
            }

        }

    </style>

</head>

<body>

    <header>

        <nav class="navbar">

            <ul>

                <li>
                    <a href="index.html">Home</a>
                </li>

                <li>
                    <a href="about.html">About</a>
                </li>

                <li>
                    <a href="convertor.html">Convertor</a>
                </li>

                <li>
                    <a href="contact.html">Contact Us</a>
                </li>

            </ul>

        </nav>

    </header>

    <h1>Contact Us</h1>

    <form id="contactForm">

        <div class="form-group">

            <label>First Name</label>

            <input
                type="text"
                id="FirstName"
                placeholder="Enter First Name"
                minlength="3"
                required
            >

        </div>

        <div class="form-group">

            <label>Last Name</label>

            <input
                type="text"
                id="LastName"
                placeholder="Enter Last Name"
                required
            >

        </div>

        <div class="form-group">

            <label>Email</label>

            <input
                type="email"
                id="Email"
                placeholder="Enter Email"
                required
            >

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <div class="phone-box">

                <select id="countryCode" required>

                    <option value="+91">
                        +91 (India)
                    </option>

                    <option value="+1">
                        +1 (USA)
                    </option>

                    <option value="+44">
                        +44 (UK)
                    </option>

                    <option value="+61">
                        +61 (Australia)
                    </option>

                    <option value="+81">
                        +81 (Japan)
                    </option>

                </select>

                <input
                    type="tel"
                    id="MobileNumber"
                    placeholder="Enter Mobile Number"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    minlength="10"
                    required
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                >

            </div>

        </div>

        <div class="form-group">

            <label>Message</label>

            <textarea
                id="Message"
                rows="6"
                placeholder="Enter Your Message"
                minlength="10"
                required
            ></textarea>

        </div>

        <button type="submit">
            Submit
        </button>

    </form>

    <div id="successMessage">
        Message Sent Successfully!
    </div>

    <!-- Google Map -->

    <div class="map-container">

        <iframe
            src="https://maps.google.com/maps?q=coimbatore&t=&z=13&ie=UTF8&iwloc=&output=embed"
            allowfullscreen
            loading="lazy">
        </iframe>

    </div>

    <script>

        // Initialize EmailJS

        (function(){

            emailjs.init({
                publicKey: "lsX9fs1gCG3lIZjOl",
            });

        })();

        const form =
            document.getElementById("contactForm");

        const successMessage =
            document.getElementById("successMessage");

        form.addEventListener(

            "submit",

            function(event){

                event.preventDefault();

                const firstName =
                    document.getElementById("FirstName")
                    .value
                    .trim();

                const lastName =
                    document.getElementById("LastName")
                    .value
                    .trim();

                const email =
                    document.getElementById("Email")
                    .value
                    .trim();

                const countryCode =
                    document.getElementById("countryCode")
                    .value;

                const mobile =
                    document.getElementById("MobileNumber")
                    .value
                    .trim();

                const message =
                    document.getElementById("Message")
                    .value
                    .trim();

                // Email Validation

                const emailPattern =
                    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if(!emailPattern.test(email)){

                    alert(
                        "Please enter a valid email address"
                    );

                    return;

                }

                // Mobile Validation

                const mobilePattern =
                    /^[0-9]{10}$/;

                if(!mobilePattern.test(mobile)){

                    alert(
                        "Mobile number must contain exactly 10 digits"
                    );

                    return;

                }

                // First Name Validation

                if(firstName.length < 3){

                    alert(
                        "First name should contain at least 3 letters"
                    );

                    return;

                }

                // Message Validation

                if(message.length < 10){

                    alert(
                        "Message should contain at least 10 characters"
                    );

                    return;

                }

                // Email Parameters

                const templateParams = {

                    first_name: firstName,

                    last_name: lastName,

                    email: email,

                    mobile:
                        countryCode + " " + mobile,

                    message: message

                };

                // Send Email

                emailjs.send(

                    "service_q2r12sd",

                    "template_12vig99",

                    templateParams

                )

                .then(function(response){

                    successMessage.style.display =
                        "block";

                    successMessage.innerHTML =
                        "Message Sent Successfully!";

                    form.reset();

                    console.log(
                        "SUCCESS!",
                        response.status,
                        response.text
                    );

                })

                .catch(function(error){

                    alert(
                        "Failed to send message"
                    );

                    console.log(
                        "ERROR:",
                        error
                    );

                });

            }

        );

    </script>

</body>

</html>
